<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@ds-phx/colors — Token Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- Inlined token CSS — enables live var() resolution for swatches/previews -->
  <style>/* @@TOKEN_CSS@@ */</style>

  <!-- Token data injected by build-docs.mjs -->
  <script>/* @@TOKEN_DATA@@ */</script>

  <style>
    /* ── UI design tokens ─────────────────────────────────────────────── */
    :root {
      --bg:       #ffffff;
      --fg:       #000000;
      --fg-muted: rgb(0 0 0 / 0.5);
      --divider:  rgb(0 0 0 / 0.1);
      color-scheme: light;
    }

    /* ── Reset / base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--divider); color: inherit; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 12px;
      line-height: 16px;
      min-height: 100dvh;
    }

    /* ── Toolbar ──────────────────────────────────────────────────────── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-items: center;
      gap: 16px;
      height: 48px;
      padding: 0 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--divider);
    }

    .logo {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── Search ───────────────────────────────────────────────────────── */
    .search-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .search {
      width: 0; /* driven by JS sizer */
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--fg);
      font-size: 12px;
      line-height: 16px;
      font-family: inherit;
      text-align: left;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .search::placeholder { color: var(--fg-muted); }
    .search::-webkit-search-cancel-button { -webkit-appearance: none; }
    .search-count {
      font-size: 12px;
      line-height: 16px;
      color: var(--fg-muted);
      white-space: nowrap;
      display: none;
    }
    .search-count.visible { display: block; }

    /* ── Controls ─────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: flex-end;
    }
    .text-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toggle-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      color: var(--fg-muted);
      line-height: 1;
      white-space: nowrap;
    }
    .toggle-btn.active { color: var(--fg); }
    .vdivider {
      width: 1px;
      height: 12px;
      background: var(--divider);
      flex-shrink: 0;
    }

    /* ── Content ──────────────────────────────────────────────────────── */
    #content {
      padding: 10px 12px 64px;
    }

    /* ── Color grid ───────────────────────────────────────────────────── */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 2px;
    }
    /* The extra left padding (on top of the base 12px) indents both the
       category headers and the swatches by the same 8px — so the card's hover
       fills flush with the swatch. #content.color-grid beats #content alone. */
    #content.color-grid { padding-left: 20px; }
    /* Category header spans the full grid row, forcing a line break. */
    .color-group-header {
      grid-column: 1 / -1;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-muted);
      padding: 20px 8px 6px 0;
    }
    .color-group-header:first-child { padding-top: 8px; }

    .color-card {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      outline: none;
      -webkit-user-select: none;
      user-select: none;
      border-radius: 0;
      position: relative;
    }
    /* Zero-height full-row element used to force a line break between dark
       and light shade rows within the same hue family. */
    .color-row-break {
      grid-column: 1 / -1;
      height: 0;
    }
    .color-card:hover,
    .color-card:focus-visible {
      background: var(--divider);
    }
    .color-card:focus-visible {
      box-shadow: inset 0 0 0 2px var(--fg);
    }

    .color-swatch {
      height: 36px;
      position: relative;
    }
    /* Checkerboard sits behind the color — only visible through transparent swatches */
    .color-swatch::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-conic-gradient(
        rgb(0 0 0 / 0.06) 0% 25%, transparent 0% 50%
      );
      background-size: 8px 8px;
    }
    /* Actual color renders on top — covers checkerboard for opaque tokens */
    .color-swatch::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--sc, transparent);
    }

    .color-label {
      font-size: 9px;
      line-height: 1.4;
      color: var(--fg-muted);
      padding: 4px 5px 6px;
      word-break: break-all;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Token list (dimensions, typography, effects) ─────────────────── */
    .token-list {
      display: flex;
      flex-direction: column;
    }

    .group-header {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-muted);
      padding: 20px 8px 6px;
    }
    .group-header:first-child {
      padding-top: 8px;
    }

    .token-row {
      display: grid;
      grid-template-columns: 180px 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 5px 8px;
      cursor: pointer;
      outline: none;
      -webkit-user-select: none;
      user-select: none;
      min-height: 36px;
    }
    .token-row:hover,
    .token-row:focus-visible {
      background: var(--divider);
    }
    .token-row:focus-visible {
      box-shadow: inset 0 0 0 1px var(--fg);
    }

    /* Visual column */
    .tok-visual {
      display: flex;
      align-items: center;
      overflow: visible;
    }

    /* Name column */
    .tok-name {
      font-size: 12px;
      color: var(--fg);
      font-family: 'SF Mono', ui-monospace, 'Fira Code', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Value column */
    .tok-value {
      font-size: 12px;
      color: var(--fg-muted);
      font-family: 'SF Mono', ui-monospace, 'Fira Code', monospace;
      white-space: nowrap;
      text-align: right;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Dimension visuals ────────────────────────────────────────────── */
    .dim-bar-track {
      width: 160px;
      height: 6px;
      position: relative;
      flex-shrink: 0;
    }
    .dim-bar-fill {
      height: 100%;
      background: var(--fg);
      min-width: 1px;
    }
    .dim-bar-neg {
      height: 100%;
      background: var(--fg-muted);
      min-width: 1px;
    }

    .dim-radius-box {
      width: 40px;
      height: 40px;
      border: 1px solid var(--fg);
      flex-shrink: 0;
    }

    .dim-stroke-line {
      width: 80px;
      background: var(--fg);
      flex-shrink: 0;
    }

    .dim-size-box {
      background: var(--fg-muted);
      flex-shrink: 0;
    }

    .dim-zindex-pill {
      font-size: 12px;
      color: var(--fg-muted);
      font-family: 'SF Mono', ui-monospace, monospace;
    }

    .dim-layout-bar {
      height: 6px;
      background: var(--fg-muted);
      flex-shrink: 0;
      opacity: 0.5;
    }

    /* ── Typography visuals ───────────────────────────────────────────── */
    .typo-sample {
      color: var(--fg);
      font-family: 'Inter', system-ui, sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
      line-height: 1.2;
    }

    .textstyle-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 8px 8px;
      cursor: pointer;
      outline: none;
      -webkit-user-select: none;
      user-select: none;
      min-height: 48px;
    }
    .textstyle-row:hover,
    .textstyle-row:focus-visible {
      background: var(--divider);
    }
    .textstyle-row:focus-visible {
      box-shadow: inset 0 0 0 1px var(--fg);
    }
    .textstyle-sample {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--fg);
      overflow: hidden;
    }
    .textstyle-classname {
      font-size: 12px;
      color: var(--fg-muted);
      font-family: 'SF Mono', ui-monospace, monospace;
      white-space: nowrap;
    }

    /* ── Effect visuals ───────────────────────────────────────────────── */
    .fx-duration-track {
      width: 160px;
      height: 4px;
      background: var(--divider);
      position: relative;
      flex-shrink: 0;
    }
    .fx-duration-fill {
      height: 100%;
      background: var(--fg);
      min-width: 2px;
    }

    .fx-blur-box {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--fg-muted);
      flex-shrink: 0;
    }

    .fx-elevation-box {
      width: 32px;
      height: 20px;
      border-radius: 0;
      background: var(--bg);
      flex-shrink: 0;
    }

    .fx-swatch {
      width: 32px;
      height: 20px;
      border-radius: 0;
      flex-shrink: 0;
      background-color: #fff;
      background-image:
        linear-gradient(45deg, rgba(0,0,0,0.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(0,0,0,0.08) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(0,0,0,0.08) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(0,0,0,0.08) 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0;
      box-shadow: inset 0 0 0 1px var(--border);
      position: relative;
      overflow: hidden;
    }

    .fx-swatch-fill {
      position: absolute;
      inset: 0;
    }

    .fx-easing-label {
      font-size: 11px;
      color: var(--fg-muted);
      font-family: 'SF Mono', ui-monospace, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    /* ── Empty state ──────────────────────────────────────────────────── */
    .empty-state {
      padding: 64px 0;
      text-align: center;
      color: var(--fg-muted);
    }
    .empty-state p { font-size: 12px; }
    .empty-state small { font-size: 12px; opacity: 0.7; }

    /* ── Toast ────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--fg);
      color: var(--bg);
      padding: 8px 14px;
      border-radius: 0;
      font-size: 12px;
      font-family: 'SF Mono', ui-monospace, 'Fira Code', monospace;
      white-space: nowrap;
      max-width: calc(100vw - 40px);
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- Toolbar -->
<nav class="toolbar" role="banner">
  <span class="logo">@ds-phx/colors</span>

  <div class="search-wrap">
    <input
      class="search"
      type="search"
      id="search"
      placeholder=""
      autocomplete="off"
      spellcheck="false"
      aria-label="Search tokens"
    >
    <span class="search-count" id="search-count" aria-live="polite"></span>
  </div>

  <div class="controls">
    <div class="text-toggle" id="group-toggle" role="group" aria-label="Color group">
      <button class="toggle-btn" data-group="all">All</button>
      <button class="toggle-btn" data-group="reference">Reference</button>
      <button class="toggle-btn" data-group="semantic">Semantic</button>
      <button class="toggle-btn" data-group="data">Data</button>
    </div>
  </div>
</nav>

<!-- Content -->
<main>
  <div id="content"></div>
</main>

<div class="toast" id="toast" role="status" aria-live="assertive"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────

let group    = localStorage.getItem('phx-colors-group') || 'all';
let query    = '';

// ── Refs ──────────────────────────────────────────────────────────────────────

const contentEl    = document.getElementById('content');
const searchEl     = document.getElementById('search');
const searchCount  = document.getElementById('search-count');
const toast        = document.getElementById('toast');

// ── Search sizer ──────────────────────────────────────────────────────────────

const sizer = document.createElement('span');
sizer.setAttribute('aria-hidden', 'true');
sizer.style.cssText = 'position:fixed;top:-9999px;visibility:hidden;white-space:pre;font-size:12px;font-family:Inter,system-ui,sans-serif;pointer-events:none;';
document.body.appendChild(sizer);

function syncSearchWidth() {
  sizer.textContent = searchEl.value || searchEl.placeholder;
  searchEl.style.width = Math.ceil(sizer.offsetWidth) + 4 + 'px';
}

// ── Group toggle ──────────────────────────────────────────────────────────────

document.getElementById('group-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-group]');
  if (!btn) return;
  switchGroup(btn.dataset.group);
});

function switchGroup(g) {
  group = g;
  localStorage.setItem('phx-colors-group', g);
  document.querySelectorAll('#group-toggle .toggle-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.group === g);
  });
  render();
}

// ── Search ────────────────────────────────────────────────────────────────────

searchEl.addEventListener('input', e => {
  query = e.target.value.trim().toLowerCase();
  syncSearchWidth();
  render();
});

function updateSearchPlaceholder() {
  const data = TOKEN_DATA.colors || [];
  searchEl.placeholder = `Search ${data.length} colors`;
}

// ── Render ────────────────────────────────────────────────────────────────────

function getFilteredTokens() {
  const data = TOKEN_DATA.colors || [];
  // When searching, bypass the group tab filter — search is top-level.
  const effectiveGroup = query ? 'all' : group;
  return data.filter(t => {
    if (effectiveGroup !== 'all' && t.group !== effectiveGroup) return false;
    if (query && !t.name.toLowerCase().includes(query) && !t.label.toLowerCase().includes(query)) return false;
    return true;
  });
}

function updateCount(n, total) {
  if (query) {
    searchCount.textContent = `${n}/${total}`;
    searchCount.classList.add('visible');
  } else {
    searchCount.classList.remove('visible');
  }
}

function render() {
  const all = TOKEN_DATA.colors || [];
  const filtered = getFilteredTokens();
  updateCount(filtered.length, all.length);

  if (filtered.length === 0) {
    const msg = query
      ? `<div class="empty-state"><p>No tokens match &ldquo;${escHtml(query)}&rdquo;</p><small>Try a different search</small></div>`
      : `<div class="empty-state"><p>No tokens yet</p><small>Edit src/colors.css and run npm run build</small></div>`;
    contentEl.className = '';
    contentEl.innerHTML = msg;
    return;
  }

  renderColors(filtered);
}

// ── Colors ────────────────────────────────────────────────────────────────────

function renderColors(tokens) {
  const frag = document.createDocumentFragment();
  let lastCategory = null;
  let lastShade = null;
  let lastSubgroup = null;

  for (const t of tokens) {
    if (t.category && t.category !== lastCategory) {
      const h = document.createElement('div');
      h.className = 'color-group-header';
      h.textContent = t.categoryLabel || t.category;
      frag.appendChild(h);
      lastCategory = t.category;
      lastShade = null;
      lastSubgroup = null;
    } else if (
      (t.shade && lastShade && t.shade !== lastShade) ||
      (t.subgroup && lastSubgroup && t.subgroup !== lastSubgroup)
    ) {
      // Same category, but a shade (dark → light) or data-palette step count
      // (e.g. diverging 5 → 7 → 9) flipped — force a line break so the next
      // sub-row starts cleanly under the previous one.
      const br = document.createElement('div');
      br.className = 'color-row-break';
      frag.appendChild(br);
    }
    if (t.shade)    lastShade = t.shade;
    if (t.subgroup) lastSubgroup = t.subgroup;

    const card = document.createElement('div');
    card.className = 'color-card';
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', `${t.name} — click to copy`);
    // --sc is the swatch color; resolves through inlined token CSS
    card.innerHTML = `
      <div class="color-swatch" style="--sc:var(${t.name})"></div>
      <span class="color-label">${escHtml(t.label)}</span>`;
    addCopyHandler(card, `var(${t.name})`, t.name);
    frag.appendChild(card);
  }

  contentEl.className = 'color-grid';
  contentEl.innerHTML = '';
  contentEl.appendChild(frag);
}

// ── Copy ──────────────────────────────────────────────────────────────────────

let toastTimer = null;

function addCopyHandler(el, copyText, label) {
  const doCopy = () => {
    const done = () => {
      el.style.background = 'var(--divider)';
      setTimeout(() => { el.style.background = ''; }, 600);
      showToast(copyText);
    };
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(copyText).then(done).catch(() => fallbackCopy(copyText, done));
    } else {
      fallbackCopy(copyText, done);
    }
  };
  el.addEventListener('click', doCopy);
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doCopy(); }
  });
}

function fallbackCopy(text, cb) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
  document.body.appendChild(el);
  el.select();
  try { document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(el);
  cb();
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

// ── Utility ───────────────────────────────────────────────────────────────────

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────

document.querySelectorAll('#group-toggle .toggle-btn').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.group === group);
});

updateSearchPlaceholder();
syncSearchWidth();
render();
</script>
</body>
</html>
